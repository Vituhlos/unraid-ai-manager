name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, test and package
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Check MCP server syntax
        run: node --check .\mcp\unraid-mcp-server.mjs

      - name: Build Unraid plugin artifacts
        shell: powershell
        run: |
          $goExe = (Get-Command go).Source
          .\scripts\package-unraid-plugin.ps1 -GoExe $goExe

      - name: Validate Unraid plugin artifact
        shell: powershell
        run: .\scripts\validate-unraid-plugin.ps1

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: unraid-ai-manager-dist
          path: |
            dist/unraid-ai-manager.plg
            dist/unraid-ai-manager-*-x86_64-1.txz
            dist/unraid-ai-manager-*-x86_64-1.txz.sha256
            dist/unraid-ai-manager-linux-amd64
            dist/unraid-ai-manager-linux-amd64.sha256
            dist/unraid-ai-helper-linux-amd64
            dist/unraid-ai-helper-linux-amd64.sha256
